resources:
  identity: doc-statement-data
  postgreSql:
    name: ffc-doc-statement-data
  service_bus:
    topics:
      - name: ffc-pay-demographics-extract
        defaultMessageTimeToLive: P3650D
        duplicateDetectionHistoryTimeWindow: PT10M30S
        requiresDuplicateDetection: true
        roles: 
        - name: receiver
        subscriptions:
          - name: ffc-doc-demographics
            deadLetteringOnMessageExpiration: true
            defaultMessageTimeToLive: P3650D
            lockDuration: PT5M
            maxDeliveryCount: 2000
      - name: ffc-doc-statement-data
        defaultMessageTimeToLive: P3650D
        duplicateDetectionHistoryTimeWindow: PT10M30S
        requiresDuplicateDetection: true
        roles: 
        - name: sender
      - name: ffc-doc-alerting
        defaultMessageTimeToLive: P3650D
        duplicateDetectionHistoryTimeWindow: PT10M30S
        requiresDuplicateDetection: true
        roles: 
        - name: sender
