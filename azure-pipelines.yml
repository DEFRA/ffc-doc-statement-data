name: '$(Build.SourceBranchName)$(System.PullRequest.SourceBranch)$(Rev:.r)'

trigger:
  - main
  - feature/*
  - release/*

pr:
  - main
  - releases/*

parameters:
  - name: prDeployment
    type: boolean
    default: true
  - name: branchDeployment
    type: boolean
    default: true
  - name: sndDeployment
    type: boolean
    default: true

resources:
  repositories:
    - repository: templates
      endpoint: DEFRA
      type: github
      name: defra/fcp-pipeline-common
      # ref: branch-name

variables:
  husky: 0

extends:
  template: fcp-common-pipeline.yaml@templates
  parameters:
    appFrameworkType: nodejs
    failOnThreshold: moderate  # Optional: moderate (default), low, high, critical
    prDeployment: ${{ parameters.prDeployment }}
    branchDeployment: ${{ parameters.branchDeployment }}
    sndDeployment: ${{ parameters.sndDeployment }}
    variableGroupName: ffc-doc-statement-data-env-var
    pr_params:
      container.delinkedEnabled: $(pr_delinkedEnabled)
      container.demographicsActive: $(pr_demographicsActive)
      container.excludeCalculationData: $(pr_excludeCalculationData)
      container.publishingEnabled: $(pr_publishingEnabled)
      container.sfi23Enabled: $(pr_sfi23Enabled)
    snd2_params:
      container.delinkedEnabled: $(snd2_delinkedEnabled)
      container.demographicsActive: $(snd2_demographicsActive)
      container.excludeCalculationData: $(snd2_excludeCalculationData)
      container.publishingEnabled: $(snd2_publishingEnabled)
      container.sfi23Enabled: $(snd2_sfi23Enabled)
    dev_params:
      container.delinkedEnabled: $(dev_delinkedEnabled)
      container.demographicsActive: $(dev_demographicsActive)
      container.excludeCalculationData: $(dev_excludeCalculationData)
      container.publishingEnabled: $(dev_publishingEnabled)
      container.sfi23Enabled: $(dev_sfi23Enabled)
    test_params:
      container.delinkedEnabled: $(test_delinkedEnabled)
      container.demographicsActive: $(test_demographicsActive)
      container.excludeCalculationData: $(test_excludeCalculationData)
      container.publishingEnabled: $(test_publishingEnabled)
      container.sfi23Enabled: $(test_sfi23Enabled)
    pre_params:
      container.delinkedEnabled: $(pre_delinkedEnabled)
      container.demographicsActive: $(pre_demographicsActive)
      container.excludeCalculationData: $(pre_excludeCalculationData)
      container.publishingEnabled: $(pre_publishingEnabled)
      container.sfi23Enabled: $(pre_sfi23Enabled)
    prd_params:
      container.delinkedEnabled: $(prd_delinkedEnabled)
      container.demographicsActive: $(prd_demographicsActive)
      container.excludeCalculationData: $(prd_excludeCalculationData)
      container.publishingEnabled: $(prd_publishingEnabled)
      container.sfi23Enabled: $(prd_sfi23Enabled)