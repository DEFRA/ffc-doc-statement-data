environment: development
environmentCode:
name: ffc-doc-statement-data
namespace: ffc-doc
workstream: ffc-doc
image: ffc-doc-statement-data

labels:
  component: service

appInsights:
  connectionString:

containerConfigMap:
  name: ffc-doc-statement-data-config-map

containerSecret:
  name: ffc-doc-statement-data
  type: Opaque

deployment:
  minReplicas: 1
  maxReplicas: 1
  cpuThreshold: 50
  memoryThreshold: 70

container:
  requestMemory: 1024Mi
  requestCpu: 900m
  limitMemory: 1024Mi
  limitCpu: 1700m
  messageQueueHost: namespace.servicebus.windows.net
  dataTopicAddress: ffc-doc-statement-data
  alertTopicAddress: ffc-doc-alerting
  demographicsTopicAddress: ffc-pay-demographics-extract
  demographicsSubscriptionAddress: ffc-doc-demographics
  retentionTopicAddress: fcp-pds-data-retention
  retentionSubscriptionAddress: ffc-doc-statement-data
  azureStorageConnectionString: dummy
  azureStorageAccountName: ffcdoc
  azureStorageUseConnectionString: false
  azureStorageCreateContainers: false
  demographicsActive: true
  etlProcessTopicErrorAddress: ffc-doc-alerting
  excludeCalculationData: true
  sfi23Enabled: true
  delinkedEnabled: true
  fakeData: true
  subsetProcessDelinked: false
  subsetProcessSfi23: false
  processDelinkedSubsetAmount: 10
  processSfi23SubsetAmount: 10
  publishingEnabled: true
  logIntervalMs: 60000
  pollingInterval: 3600000
  pollWindowStart: "00:00"
  pollWindowEnd: "23:59"
  pollWindowDays: "Sun,Mon,Tue,Wed,Thu,Fri,Sat"
  pollWindowEnabled: true
  useNewDWHContainer: true

postgresService:
  postgresDb: ffc_doc_statement_data
  postgresqlHost: ffc-doc-statement-data-postgres
  postgresPort: 5432
  postgresSchema: public
  postgresUser: postgres

workloadIdentity: true

azureIdentity:
  clientID: not-a-real-clientID
  resourceID: not-a-real-resourceID

secretProviderClass:
  azure:
    keyvaultName: SNDFFCINFKV2001
    objects: # reading the secret from Azure Key Vault
      - objectName: appInsights-connectionString # secret name in Azure Key Vault
        objectType: secret

  secretObjects: # creating a Kubernetes secret from the Azure Key Vault secrets
    - secretName: ffc-doc-statement-data
      type: Opaque
      data:
        - objectName: appInsights-connectionString # secret name in Azure Key Vault
          key: APPLICATIONINSIGHTS_CONNECTION_STRING # the secret key in the Kubernetes secret and use in the application